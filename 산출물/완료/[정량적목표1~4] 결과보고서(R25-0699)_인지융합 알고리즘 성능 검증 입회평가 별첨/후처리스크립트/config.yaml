# =============================================================================
# EDGE 입회평가 후처리 스크립트 설정 파일 (config.yaml)
# =============================================================================
# 사용법:
# - scenario 값을 1/2/3/4 중 하나로 설정하고, 아래 공통 설정을 채운 뒤 실행
# - 예) python3 post_processing_selected_obstacles_v7.py --config config.yaml
#
# 단위/규칙:
# - 좌표 단위: dm(=0.1m) 기준
# - 프레임: 로그의 "[F<number>]" 태그가 기준
# - only_module: 기본 "DAFU" (다른 모듈 로그는 무시)
#
# 권장:
# - 시나리오별 전용 설정은 아래 섹션에서 주석을 해제하여 사용
# =============================================================================


# =============================================================================
# 시나리오 1 : Fusion Time 성능 평가
# =============================================================================
# - 목적: 프레임별 FUSION_TIME 평균/최대 산출
# - 로그 패턴: [KATECH] FUSION_TIME: <ms>
# -----------------------------------------------------------------------------
# scenario: 1
# log_path: "./평가/1번.txt"
# fusion_count: 50
# only_module: "DAFU"

# =============================================================================
# 시나리오 2 : 맵 범위 내/외 장애물 정리
# =============================================================================
# - 목적: RELATIVETOMAP before/after 및 맵 범위 밖 제거 로그를 프레임별 정리
# - 매칭 규칙: "before 직후" 등장하는 after/remove를 같은 장애물로 간주
# -----------------------------------------------------------------------------
# scenario: 2
# log_path: "평가/2번.txt"
# fusion_count: 50
# only_module: "DAFU"

# =============================================================================
# 시나리오 3 : Occupancy Grid 정확도 검증
# =============================================================================
# - 목적: 로그의 occupancy index와 polygon rasterize 결과 비교
# - cell_size: 좌표 단위(dm) 기준 1.0 권장 (1 cell = 1 dm)
# -----------------------------------------------------------------------------
scenario: 3
log_path: "평가/3_4번.txt"
fusion_count: 50
only_module: "DAFU"
target_obstacle_ids: [1]
cell_size: 1.0
max_list_cells: 100

# =============================================================================
# 시나리오 4 : 지정 장애물 위치 오차 평가 (MERGELIST 기반)
# =============================================================================
# - 목적: MERGELIST 로그에서 지정 ID 위치를 추출하여 GT와 비교
# - target_gt_xy 단위: dm (0.1m)
# - PASS 기준: 80cm 이하 (즉, 8dm 이하)
#   * pos_error_thresh_cm: cm 단위로 입력
#   * dm 변환: dm = cm / 10
# - NOT_FOUND 처리:
#   * scenario4_not_found_policy: "fail" | "exclude"
# -----------------------------------------------------------------------------
# scenario: 4
# log_path: "평가/3_4번.txt"
# fusion_count: 50
# only_module: "DAFU"
# target_obstacle_id: 1
# target_gt_xy: [156.83, 79]   # dm 단위
# pos_error_thresh_cm: 80.0      # 80cm => 8dm
# scenario4_not_found_policy: "fail"
